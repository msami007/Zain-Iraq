services:
  - type: web
    name: zain-kb-app
    env: node
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    preDeployCommand: node node_modules/prisma/build/index.js migrate deploy
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zain-kb-db
          property: connectionString
      - fromGroup: zain-kb-secrets

databases:
  - name: zain-kb-db
    plan: free

envVarGroups:
  - name: zain-kb-secrets
    envVars:
      - key: AUTH_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
